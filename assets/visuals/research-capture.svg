    <text x="22" y="38" fill="#D7FF38" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">RESEARCH SIGNAL</text>
    <text x="22" y="72" fill="#F4F5F0" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="850">3D object detection</text>
  </g>
</svg>
