<svg width="760" height="520" viewBox="0 0 760 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">3D scan to decision workflow</title>
  <desc id="desc">A clean product-style visual showing scan data flowing into analysis and quality report modules.</desc>
  <style>
    .dash { stroke-dasharray: 9 11; animation: dash 16s linear infinite; }
