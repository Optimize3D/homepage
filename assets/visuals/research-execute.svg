<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Research-derived quality decision visual</title>
  <desc id="desc">A web visual inspired by 3D scanning-based quality control, deviation maps, and weld-line detection research.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0A0C0D"/><stop offset="1" stop-color="#242821"/></linearGradient>
    <linearGradient id="map" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#D7FF38"/><stop offset=".5" stop-color="#F4F5F0"/><stop offset="1" stop-color="#FF6B35"/></linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="#D7FF38" stroke-opacity=".07"/></pattern>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect width="1200" height="760" fill="url(#grid)"/>
  <path d="M240 335c138-92 322-122 512-90 96 16 172 50 236 94-150 78-316 116-498 102-96-8-178-41-250-106Z" fill="#151A1A" stroke="#F4F5F0" stroke-opacity=".28" stroke-width="2"/>
  <path d="M279 335c128-66 280-86 456-60 70 10 132 30 188 60-134 50-276 74-430 62-79-6-151-26-214-62Z" fill="url(#map)" opacity=".78"/>
  <path d="M312 335c108-45 232-56 372-38" stroke="#0A0C0D" stroke-opacity=".42" stroke-width="6" stroke-linecap="round"/>
  <path d="M612 292c94 16 174 40 250 72" stroke="#0A0C0D" stroke-opacity=".35" stroke-width="5" stroke-linecap="round"/>
  <g transform="translate(808 402)">
    <rect width="244" height="128" rx="16" fill="#F4F5F0" fill-opacity=".09" stroke="#F4F5F0" stroke-opacity=".18"/>
    <text x="22" y="38" fill="#D7FF38" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">QUALITY DECISION</text>
    <text x="22" y="74" fill="#F4F5F0" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850">+/- 3.8 mm</text>
    <text x="22" y="102" fill="#F4F5F0" fill-opacity=".68" font-family="Inter, Arial, sans-serif" font-size="15">Report / CAD / robot data</text>
  </g>
  <g transform="translate(118 458)" font-family="Inter, Arial, sans-serif">
    <text x="0" y="0" fill="#F4F5F0" fill-opacity=".72" font-size="16" font-weight="800">CAD DEVIATION MAP</text>
    <rect x="0" y="22" width="256" height="14" rx="7" fill="url(#map)"/>
    <text x="0" y="62" fill="#F4F5F0" fill-opacity=".66" font-size="14">inspection evidence / tolerance band</text>
  </g>
</svg>
